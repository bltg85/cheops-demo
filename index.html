<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Cheops — Pyramidens mattegåtor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Outfit','ui-sans-serif','system-ui'] },
        colors: {
          sand: {
            50:  '#faf7f1',
            100: '#f4ede0',
            200: '#e8dbc1',
            300: '#d6bf93',
            400: '#c19f5f',
            500: '#a88444',
            600: '#8b6a34',
            700: '#6d5128',
            800: '#4b3718',
            900: '#2a1f0e'
          }
        }
      }
    }
  }
</script>
<style>
  :root { color-scheme: light; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Outfit', system-ui, sans-serif;
    background: #faf7f1;
    color: #2a1f0e;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200' viewBox='0 0 200 200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.16  0 0 0 0 0.12  0 0 0 0 0.05  0 0 0 0.18 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    mix-blend-mode: multiply;
    opacity: .55;
    z-index: 1;
  }

  /* desert wash background */
  body::after {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 90% 60% at 80% -10%, #f4ede0 0%, transparent 55%),
      radial-gradient(ellipse 120% 70% at 20% 110%, #e8dbc1 0%, transparent 60%);
    z-index: 0;
  }

  main, header, aside, .above-bg { position: relative; z-index: 2; }

  .room {
    min-height: 100dvh;
    padding: 6rem 1.25rem 3rem;
    display: grid;
    place-items: center;
  }
  .room[data-locked="true"] .chamber {
    opacity: 0.2;
    filter: blur(3px) grayscale(0.4);
    pointer-events: none;
    user-select: none;
  }
  .chamber { max-width: 720px; width: 100%; }

  .shake { animation: shake .42s cubic-bezier(.36,.07,.19,.97); }
  @keyframes shake {
    10%,90% { transform: translateX(-2px); }
    20%,80% { transform: translateX(4px); }
    30%,50%,70% { transform: translateX(-8px); }
    40%,60% { transform: translateX(8px); }
  }

  .pop { animation: pop .55s cubic-bezier(.34,1.56,.64,1); }
  @keyframes pop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  .float-in {
    animation: floatIn .7s cubic-bezier(.22,1,.36,1) both;
    animation-delay: calc(var(--i, 0) * 70ms);
  }
  @keyframes floatIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: none; }
  }

  .breathe { animation: breathe 3.2s ease-in-out infinite; transform-origin: center; }
  @keyframes breathe {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.015); }
  }

  .answer-input {
    font-variant-numeric: tabular-nums;
  }
  .answer-input::-webkit-outer-spin-button,
  .answer-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .answer-input[type=number] { -moz-appearance: textfield; }

  .key { transition: transform .08s ease, background-color .2s ease, border-color .2s ease; }
  .key:active { transform: translateY(1px) scale(.97); }

  .btn { transition: transform .08s ease, background-color .2s ease; }
  .btn:active { transform: translateY(1px); }

  .stone { transition: fill .65s cubic-bezier(.22,1,.36,1), stroke .65s ease; }

  .scanline {
    background: linear-gradient(90deg, transparent 0%, #8b6a34 50%, transparent 100%);
  }

  @media (max-width: 820px) {
    .desktop-pyramid { display: none; }
    .room { padding-top: 7.5rem; }
  }
  @media (min-width: 821px) {
    .mobile-pyramid { display: none; }
  }
</style>
</head>
<body>

<header class="fixed top-0 left-0 right-0 z-30 pointer-events-none">
  <div class="max-w-6xl mx-auto px-5 pt-5 flex items-start justify-between gap-4">
    <div class="pointer-events-auto flex items-center gap-2.5">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2a1f0e" stroke-width="1.5" stroke-linejoin="round">
        <path d="M12 3 L21.5 20.5 L2.5 20.5 Z"/>
        <path d="M12 3 L12 20.5" stroke-dasharray="1,2" opacity=".5"/>
      </svg>
      <div class="text-sm font-semibold tracking-tight">Cheops</div>
      <div class="hidden sm:block text-xs text-sand-600 tracking-tight">— pyramidens mattegåtor</div>
    </div>
    <div id="hud" class="pointer-events-auto text-right">
      <div class="text-[10px] uppercase tracking-[0.2em] text-sand-500 font-medium">Nuvarande kammare</div>
      <div id="room-label" class="text-sm font-semibold tracking-tight">Fot av pyramiden</div>
    </div>

<!-- Desktop pyramid (left rail) -->
<aside class="desktop-pyramid fixed left-6 top-1/2 -translate-y-1/2 z-20 above-bg">

  <div class="mt-2 text-center text-[10px] uppercase tracking-[0.2em] text-sand-500 font-medium">
    <span id="progress-label">0 / 10</span>

  <svg id="pyramid-mobile" width="74" height="40" viewBox="0 0 140 80" aria-hidden="true"></svg>
  <div class="mt-0.5 text-[9px] uppercase tracking-[0.2em] text-sand-500 font-medium">

<main id="game"></main>

<script>
/* ------------------------------------------------------------------ */
/* Utilities                                                          */
/* ------------------------------------------------------------------ */
const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
const norm = s => s.toString().trim().toLowerCase().replace(/\s+/g, '');

/* ------------------------------------------------------------------ */
/* Level configuration                                                */
/* ------------------------------------------------------------------ */
const LEVELS = [
  {
    id: 1, title: 'Sandens kammare', subtitle: 'Enkla plustal · ental',
    kind: 'numeric', count: 10,
    generate: () => { const a = rand(1,9), b = rand(1,9); return { q: `${a} + ${b}`, a: a+b }; }
  },
  {
    id: 2, title: 'Skuggornas gång', subtitle: 'Enkla minustal · ental',
    kind: 'numeric', count: 10,
    generate: () => { const a = rand(2,9), b = rand(1,a); return { q: `${a} − ${b}`, a: a-b }; }
  },
  {
    id: 3, title: 'Stenhuggarens sal', subtitle: 'Tvåsiffrig addition',
    kind: 'numeric', count: 10,
    generate: () => {
      let a, b;
      do { a = rand(10, 79); b = rand(10, 79); } while (a + b > 99);
      return { q: `${a} + ${b}`, a: a+b };
    }
  },
  {
    id: 4, title: 'Solens kapell', subtitle: 'Blixt-addition · 2 minuter',
    kind: 'numeric', count: 10, timer: 120,
    generate: () => { const a = rand(1,9), b = rand(1,9); return { q: `${a} + ${b}`, a: a+b }; }
  },
  {
    id: 5, title: 'Cirkelns gåta', subtitle: 'Kammarens gåta · geometri',
    kind: 'puzzle', count: 1,
    puzzle: {
      q: 'Hur många grader går det runt en hel cirkel?',
      a: [360],
      graphic: 'circle',
      hint: 'Fyra räta vinklar tillsammans.'
    }
  },
  {
    id: 6, title: 'Multipliklarens torn', subtitle: 'Entalsmultiplikation',
    kind: 'numeric', count: 20,
    generate: () => { const a = rand(2,9), b = rand(2,9); return { q: `${a} × ${b}`, a: a*b }; }
  },
  {
    id: 7, title: 'Mörka galleriet', subtitle: 'Tvåsiffrig subtraktion',
    kind: 'numeric', count: 20,
    generate: () => {
      const a = rand(25, 99);
      const b = rand(10, a - 1);
      return { q: `${a} − ${b}`, a: a-b };
    }
  },
  {
    id: 8, title: 'De tre bärarna', subtitle: 'Addition av tre tal',
    kind: 'numeric', count: 20,
    generate: () => {
      const a = rand(1, 25), b = rand(1, 25), c = rand(1, 25);
      return { q: `${a} + ${b} + ${c}`, a: a+b+c };
    }
  },
  {
    id: 9, title: 'Falkens flygning', subtitle: 'Blixt-subtraktion · 3 minuter',
    kind: 'numeric', count: 20, timer: 180,
    generate: () => {
      const a = rand(25, 99);
      const b = rand(10, a - 1);
      return { q: `${a} − ${b}`, a: a-b };
    }
  },
  {
    id: 10, title: 'Toppstenen', subtitle: 'Toppens gåta · geometri',
    kind: 'puzzle', count: 1,
    puzzle: {
      q: 'Vad heter den här fyrhörningen?',
      a: ['parallelltrapets', 'paralleltrapets'],
      answerType: 'text',
      graphic: 'trapezoid',
      hint: 'Två sidor är parallella, men den är inte en rektangel.'
    }
  }
];

/* ------------------------------------------------------------------ */
/* Pyramid SVG                                                        */
/* ------------------------------------------------------------------ */
function drawPyramid(svg, w, h) {
  const svgNS = 'http://www.w3.org/2000/svg';
  svg.innerHTML = '';
  const apexY = 10, baseY = h - 12;
  const cx = w / 2, halfBase = (w - 20) / 2;
  const pyrHeight = baseY - apexY;
  for (let i = 1; i <= 10; i++) {
    const yb = baseY - (i - 1) * (pyrHeight / 10);
    const yt = baseY - i * (pyrHeight / 10);
    const bw = halfBase * (yb - apexY) / pyrHeight;
    const tw = halfBase * (yt - apexY) / pyrHeight;
    const pts = [
      [cx - bw, yb],
      [cx + bw, yb],
      [cx + tw, yt],
      [cx - tw, yt]
    ].map(p => p.map(n => n.toFixed(2)).join(',')).join(' ');
    const poly = document.createElementNS(svgNS, 'polygon');
    poly.setAttribute('points', pts);
    poly.setAttribute('data-level', i);
    poly.setAttribute('class', 'stone');
    poly.setAttribute('fill', '#f4ede0');
    poly.setAttribute('stroke', '#8b6a34');
    poly.setAttribute('stroke-width', '0.6');
    svg.appendChild(poly);
  }
}

function updatePyramid() {
  const lvl = state.currentLevel;
  document.querySelectorAll('#pyramid polygon, #pyramid-mobile polygon').forEach(p => {
    const n = parseInt(p.dataset.level);
    p.classList.remove('breathe');
    if (n < lvl) {
      p.setAttribute('fill', '#8b6a34');
      p.setAttribute('stroke', '#4b3718');
    } else if (n === lvl) {
      p.setAttribute('fill', '#c19f5f');
      p.setAttribute('stroke', '#6d5128');
      p.classList.add('breathe');
    } else {
      p.setAttribute('fill', '#f4ede0');
      p.setAttribute('stroke', '#d6bf93');
    }
  });
  const completed = Math.max(0, Math.min(10, lvl - 1));
  document.getElementById('progress-label').textContent = `${completed} / 10`;
  document.getElementById('progress-label-mobile').textContent = `${completed} / 10`;
}

/* ------------------------------------------------------------------ */
/* Puzzle graphics                                                    */
/* ------------------------------------------------------------------ */
function renderGraphic(kind) {
  if (kind === 'circle') {
    return `
      <svg width="180" height="180" viewBox="0 0 180 180" class="max-w-full">
        <defs>
          <pattern id="stripe" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
            <rect width="3" height="6" fill="#e8dbc1"/>
          </pattern>
        </defs>
        <circle cx="90" cy="90" r="72" fill="url(#stripe)" stroke="#2a1f0e" stroke-width="2"/>
        <line x1="90" y1="18" x2="90" y2="162" stroke="#8b6a34" stroke-width="1" stroke-dasharray="3,4"/>
        <line x1="18" y1="90" x2="162" y2="90" stroke="#8b6a34" stroke-width="1" stroke-dasharray="3,4"/>
        <path d="M 102 90 L 102 78 L 90 78" fill="none" stroke="#6d5128" stroke-width="1.8"/>
        <text x="105" y="84" font-family="Outfit" font-size="11" font-weight="600" fill="#4b3718">90°</text>
        <circle cx="90" cy="90" r="3" fill="#2a1f0e"/>
      </svg>`;
  }
  if (kind === 'trapezoid') {
    return `
      <svg width="220" height="150" viewBox="0 0 220 150" class="max-w-full">
        <defs>
          <pattern id="stripe2" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
            <rect width="3" height="6" fill="#e8dbc1"/>
          </pattern>
        </defs>
        <polygon points="58,24 162,24 198,122 22,122" fill="url(#stripe2)" stroke="#2a1f0e" stroke-width="2" stroke-linejoin="round"/>
        <line x1="58" y1="24" x2="162" y2="24" stroke="#a88444" stroke-width="3.5"/>
        <line x1="22" y1="122" x2="198" y2="122" stroke="#a88444" stroke-width="3.5"/>
        <text x="110" y="16" text-anchor="middle" font-family="Outfit" font-size="10" font-weight="500" fill="#6d5128">parallell</text>
        <text x="110" y="142" text-anchor="middle" font-family="Outfit" font-size="10" font-weight="500" fill="#6d5128">parallell</text>
      </svg>`;
  }
  return '';
}

/* ------------------------------------------------------------------ */
/* DOM rendering                                                      */
/* ------------------------------------------------------------------ */
const game = document.getElementById('game');

function createRoom(level) {
  const s = document.createElement('section');
  s.className = 'room';
  s.dataset.level = level.id;
  s.dataset.locked = 'true';
  const isText = level.kind === 'puzzle' && level.puzzle.answerType === 'text';
  const hasTimer = !!level.timer;

  s.innerHTML = `
    <div class="chamber">
      <div class="flex items-start justify-between gap-6 mb-6 float-in" style="--i:0">
        <div class="min-w-0">
          <div class="text-[10px] uppercase tracking-[0.22em] text-sand-500 font-medium">Kammare ${String(level.id).padStart(2,'0')} av 10</div>
          <h2 class="mt-2 text-3xl md:text-5xl tracking-tighter font-semibold leading-[0.95]">${level.title}</h2>
          <p class="mt-1.5 text-sand-600 text-sm md:text-base">${level.subtitle}</p>
        </div>
        ${hasTimer ? `
          <div class="text-right shrink-0">
            <div class="text-[10px] uppercase tracking-[0.22em] text-sand-500 font-medium">Tid</div>
            <div class="timer-display mt-2 text-2xl md:text-3xl font-semibold tabular-nums">--:--</div>
            <div class="timer-bar mt-1.5 w-20 h-1 bg-sand-200 rounded-full overflow-hidden">
              <div class="timer-fill h-full bg-sand-700 origin-left" style="transform: scaleX(1)"></div>
            </div>
          </div>` : ''}
      </div>

      <div class="progress-row flex flex-wrap gap-1.5 mb-8 float-in" style="--i:1">
        ${level.kind === 'puzzle'
          ? `<span class="text-[10px] uppercase tracking-[0.22em] text-sand-500 font-medium">Bossgåta</span>`
          : Array.from({length: level.count}, () => `<span class="dot w-2 h-2 rounded-full bg-sand-200"></span>`).join('')}
      </div>

      ${level.kind === 'puzzle' ? `
        <div class="puzzle-graphic mb-4 flex justify-center float-in" style="--i:2">${renderGraphic(level.puzzle.graphic)}</div>
        <p class="puzzle-prompt text-center text-sand-700 text-base md:text-lg mb-6 max-w-[48ch] mx-auto float-in" style="--i:3">${level.puzzle.q}</p>
      ` : ''}

      <div class="question-area border-t border-b border-sand-300 py-10 md:py-14 mb-6 float-in" style="--i:${level.kind === 'puzzle' ? 4 : 2}">
        <div class="question-text text-center text-5xl md:text-7xl tracking-tighter font-semibold tabular-nums">—</div>
      </div>

      <form class="answer-form flex flex-col sm:flex-row gap-3 items-stretch float-in" style="--i:${level.kind === 'puzzle' ? 5 : 3}">
        <input
          type="${isText ? 'text' : 'number'}"
          inputmode="${isText ? 'text' : 'numeric'}"
          pattern="${isText ? '' : '[0-9-]*'}"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          class="answer-input flex-1 text-2xl md:text-3xl font-semibold tabular-nums bg-white/60 border-2 border-sand-300 rounded-xl px-5 py-4 outline-none focus:border-sand-900 focus:bg-white placeholder:text-sand-300 shadow-[inset_0_1px_0_rgba(255,255,255,0.6)]"
          placeholder="${isText ? 'Skriv figurens namn' : 'Ditt svar'}"
        >
        <button type="submit" class="btn px-7 py-4 rounded-xl bg-sand-900 text-sand-50 font-semibold hover:bg-sand-800 shadow-[inset_0_1px_0_rgba(255,255,255,0.1)]">
          Svara
        </button>
      </form>

      <div class="feedback mt-3 text-sm font-medium min-h-[1.25rem]"></div>

      ${isText ? '' : `
        <div class="keypad mt-5 grid grid-cols-3 gap-2 sm:hidden">
          ${[1,2,3,4,5,6,7,8,9].map(n => `<button type="button" data-key="${n}" class="key py-5 rounded-xl bg-white/70 border border-sand-300 text-2xl font-semibold shadow-[inset_0_1px_0_rgba(255,255,255,0.6)]">${n}</button>`).join('')}
          <button type="button" data-key="clear" class="key py-5 rounded-xl bg-sand-100 border border-sand-300 text-xs font-medium text-sand-700 uppercase tracking-wider">Rensa</button>
          <button type="button" data-key="0" class="key py-5 rounded-xl bg-white/70 border border-sand-300 text-2xl font-semibold shadow-[inset_0_1px_0_rgba(255,255,255,0.6)]">0</button>
          <button type="button" data-key="submit" class="key py-5 rounded-xl bg-sand-900 text-sand-50 text-xs font-medium uppercase tracking-wider">Svara</button>
        </div>`}
    </div>
  `;
  return s;
}

function createVictory() {
  const v = document.createElement('section');
  v.className = 'room';
  v.id = 'victory';
  v.innerHTML = `
    <div class="chamber text-center">
      <svg width="120" height="120" viewBox="0 0 120 120" class="mx-auto mb-6">
        <polygon points="60,12 108,100 12,100" fill="#c19f5f" stroke="#4b3718" stroke-width="1.5"/>
        <polygon points="60,12 108,100 60,100" fill="#8b6a34" stroke="#4b3718" stroke-width="1.5"/>
        <circle cx="60" cy="18" r="4" fill="#c19f5f" stroke="#4b3718" stroke-width="1"/>
      </svg>
      <div class="text-[10px] uppercase tracking-[0.22em] text-sand-500 font-medium">Toppen nådd</div>
      <h2 class="mt-3 text-4xl md:text-6xl tracking-tighter font-semibold leading-[0.95]">
        Pyramidens topp<br><span class="italic font-light text-sand-600">är din.</span>
      </h2>
      <p class="mt-5 text-sand-700 max-w-[44ch] mx-auto">
        Tio kammare av sten och siffror — avklarade. Fler väntar i den fullständiga pyramiden.
      </p>
      <button id="restart-btn" class="btn mt-8 inline-flex items-center gap-2 px-6 py-3.5 rounded-full border border-sand-400 text-sand-900 font-medium hover:bg-sand-100">
        Spela igen
      </button>
    </div>
  `;

}

function createIntro() {
  const s = document.createElement('section');
  s.className = 'room';
  s.id = 'intro';
  s.innerHTML = `
    <div class="chamber text-center">
      <div class="inline-flex items-center gap-3 text-[10px] uppercase tracking-[0.25em] text-sand-600 mb-8">
        <span class="w-10 h-px bg-sand-400"></span>
        Demo · 10 kammare
        <span class="w-10 h-px bg-sand-400"></span>
      </div>
      <h1 class="text-5xl md:text-7xl tracking-tighter leading-[0.9] font-semibold">
        Cheops<br><span class="italic font-light text-sand-600">pyramidens gåtor</span>
      </h1>
      <p class="mt-7 text-base md:text-lg text-sand-700 leading-relaxed max-w-[48ch] mx-auto">
        Tio kammare. Tio gåtor av sten och siffror. Lös dem — och du klättrar uppåt i pyramiden. En modern tolkning av det gamla 90-talsspelet.
      </p>
      <p class="mt-3 text-sm text-sand-600 max-w-[44ch] mx-auto">
        Skriv svaret med tangentbordet eller tryck på knapparna. Enter svarar.
      </p>
      <button id="start-btn" class="btn mt-10 inline-flex items-center gap-2.5 px-8 py-4 rounded-full bg-sand-900 text-sand-50 font-medium text-base hover:bg-sand-800 shadow-[inset_0_1px_0_rgba(255,255,255,0.1)]">
        Börja klättringen
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19V5M5 12l7-7 7 7"/>
        </svg>
      </button>
      <div class="mt-14 text-[10px] uppercase tracking-[0.25em] text-sand-500">
        Rekommenderad ålder · 7–10 år
      </div>
    </div>
  `;
  return s;
}

/* ------------------------------------------------------------------ */
/* Game state                                                         */
/* ------------------------------------------------------------------ */
const state = {
  currentLevel: 0,
  currentQuestionIndex: 0,
  currentQuestions: [],
  timerInterval: null,
  timerEndsAt: null,
  timerTotal: 0
};

function generateQuestions(level) {
  if (level.kind === 'puzzle') return [level.puzzle];
  return Array.from({ length: level.count }, () => level.generate());
}

function renderCurrentQuestion(section, level) {
  const q = state.currentQuestions[state.currentQuestionIndex];
  const qText = section.querySelector('.question-text');
  qText.textContent = q.q;
  qText.classList.remove('pop');
  void qText.offsetWidth;
  qText.classList.add('pop');

  section.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.remove('bg-sand-200','bg-sand-500','bg-sand-800');
    if (i < state.currentQuestionIndex) d.classList.add('bg-sand-800');
    else if (i === state.currentQuestionIndex) d.classList.add('bg-sand-500');
    else d.classList.add('bg-sand-200');
  });

  const input = section.querySelector('.answer-input');
  input.value = '';
  section.querySelector('.feedback').textContent = '';
  section.querySelector('.feedback').className = 'feedback mt-3 text-sm font-medium min-h-[1.25rem]';
}

function enterRoom(id) {
  const level = LEVELS[id - 1];
  state.currentLevel = id;
  state.currentQuestionIndex = 0;
  state.currentQuestions = generateQuestions(level);

  const section = game.querySelector(`[data-level="${id}"]`);
  // lock all, unlock this one
  game.querySelectorAll('.room[data-level]').forEach(r => r.dataset.locked = 'true');
  section.dataset.locked = 'false';

  renderCurrentQuestion(section, level);
  updatePyramid();

  document.getElementById('room-label').textContent = `${String(id).padStart(2,'0')} · ${level.title}`;

  if (level.timer) startTimer(section, level.timer);

  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  setTimeout(() => {
    const input = section.querySelector('.answer-input');
    if (input && window.matchMedia('(min-width: 821px)').matches) input.focus();
  }, 700);
}

function handleSubmit(section, level, rawValue) {
  const q = state.currentQuestions[state.currentQuestionIndex];
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const isText = level.kind === 'puzzle' && level.puzzle.answerType === 'text';

  let userVal;
  let correct = false;
  if (isText) {
    userVal = norm(rawValue);
    if (!userVal) return;
    correct = accepted.some(a => norm(a) === userVal);
  } else {
    userVal = parseInt(rawValue, 10);
    if (Number.isNaN(userVal)) return;
    correct = accepted.some(a => Number(a) === userVal);
  }

  const feedback = section.querySelector('.feedback');
  const input = section.querySelector('.answer-input');

  if (correct) {
    feedback.textContent = 'Rätt!';
    feedback.className = 'feedback mt-3 text-sm font-medium min-h-[1.25rem] text-sand-800';
    const qText = section.querySelector('.question-text');
    qText.classList.remove('pop');
    void qText.offsetWidth;
    qText.classList.add('pop');
    state.currentQuestionIndex++;
    if (state.currentQuestionIndex >= state.currentQuestions.length) {
      setTimeout(() => completeRoom(level), 450);
    } else {
      setTimeout(() => renderCurrentQuestion(section, level), 350);
    }
  } else {
    feedback.textContent = level.kind === 'puzzle' && level.puzzle.hint
      ? `Nästan! Ledtråd: ${level.puzzle.hint}`
      : 'Fel svar — försök igen.';
    feedback.className = 'feedback mt-3 text-sm font-medium min-h-[1.25rem] text-red-800';
    input.classList.remove('shake');
    void input.offsetWidth;
    input.classList.add('shake');
    input.select();
  }
}

function completeRoom(level) {
  if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
  state.currentLevel = level.id + 1;
  updatePyramid();
  if (level.id >= 10) {
    document.getElementById('room-label').textContent = 'Toppen nådd';
    const v = document.getElementById('victory');
    v.dataset.locked = 'false';
    v.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else {
    enterRoom(level.id + 1);
  }
}

/* ------------------------------------------------------------------ */
/* Timer                                                              */
/* ------------------------------------------------------------------ */
function startTimer(section, seconds) {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerTotal = seconds;
  state.timerEndsAt = Date.now() + seconds * 1000;
  const display = section.querySelector('.timer-display');
  const fill = section.querySelector('.timer-fill');
  const tick = () => {
    const remain = Math.max(0, (state.timerEndsAt - Date.now()) / 1000);
    const whole = Math.ceil(remain);
    const m = Math.floor(whole / 60);
    const s = whole % 60;
    display.textContent = `${m}:${String(s).padStart(2,'0')}`;
    if (fill) fill.style.transform = `scaleX(${(remain / state.timerTotal).toFixed(3)})`;
    if (whole <= 10) display.classList.add('text-red-800');
    else display.classList.remove('text-red-800');
    if (remain <= 0) {
      clearInterval(state.timerInterval);
      state.timerInterval = null;
      timeoutFailure(section);
    }
  };
  tick();
  state.timerInterval = setInterval(tick, 200);
}

function timeoutFailure(section) {
  const feedback = section.querySelector('.feedback');
  feedback.textContent = 'Sanden rann ut. Kammaren börjar om.';
  feedback.className = 'feedback mt-3 text-sm font-medium min-h-[1.25rem] text-red-800';
  const level = LEVELS[state.currentLevel - 1];
  setTimeout(() => {
    state.currentQuestions = generateQuestions(level);
    state.currentQuestionIndex = 0;
    renderCurrentQuestion(section, level);
    startTimer(section, level.timer);
  }, 1400);
}

/* ------------------------------------------------------------------ */
/* Event wiring                                                       */
/* ------------------------------------------------------------------ */
document.addEventListener('submit', (e) => {
  const form = e.target.closest('.answer-form');
  if (!form) return;
  e.preventDefault();
  const section = form.closest('.room');
  if (!section || section.dataset.locked === 'true') return;
  const level = LEVELS[parseInt(section.dataset.level, 10) - 1];
  const value = section.querySelector('.answer-input').value;
  handleSubmit(section, level, value);
});

document.addEventListener('click', (e) => {
  const key = e.target.closest('.key');
  if (key) {
    const section = key.closest('.room');
    if (!section || section.dataset.locked === 'true') return;
    const input = section.querySelector('.answer-input');
    const k = key.dataset.key;
    if (k === 'clear') input.value = '';
    else if (k === 'submit') section.querySelector('.answer-form').requestSubmit();
    else input.value = (input.value || '') + k;
    return;
  }

  if (e.target.closest('#start-btn')) {
    enterRoom(1);
    return;
  }
  if (e.target.closest('#restart-btn')) {
    state.currentLevel = 0;
    updatePyramid();
    document.getElementById('victory').dataset.locked = 'true';
    document.getElementById('intro').scrollIntoView({ behavior: 'smooth', block: 'start' });
    return;
  }
});

// Hardware keyboard Enter anywhere on desktop submits the active room
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  const active = game.querySelector('.room[data-locked="false"][data-level]');
  if (!active) return;
  const form = active.querySelector('.answer-form');
  if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
  form.requestSubmit();
});

/* ------------------------------------------------------------------ */
/* Boot                                                               */
/* ------------------------------------------------------------------ */
(function boot() {
  // Build DOM: victory (top) → rooms 10..1 → intro (bottom)
  game.appendChild(createVictory());
  document.getElementById('victory').dataset.locked = 'true';
  for (let i = 9; i >= 0; i--) game.appendChild(createRoom(LEVELS[i]));
  game.appendChild(createIntro());

  drawPyramid(document.getElementById('pyramid'), 140, 200);
  drawPyramid(document.getElementById('pyramid-mobile'), 140, 80);
  updatePyramid();

  // Land on intro (at the bottom of the page)
  document.documentElement.style.scrollBehavior = 'auto';
  window.scrollTo(0, document.body.scrollHeight);
  requestAnimationFrame(() => {
    setTimeout(() => {
      document.documentElement.style.scrollBehavior = 'smooth';
    }, 80);
  });
})();
</script>
